<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Collatio Labs</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',system-ui,sans-serif;background:#0a0a0a;color:#e4e4e7;min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}
.wrap{text-align:center;padding:0 24px}
h1{font-size:clamp(24px,4vw,40px);font-weight:500;letter-spacing:.2em;text-transform:uppercase;color:#fff}
p{margin-top:16px;font-size:clamp(13px,1.5vw,15px);font-weight:300;color:#555;letter-spacing:.04em}
.contact{position:fixed;bottom:32px;right:40px;font-size:13px;font-weight:400;color:#333;letter-spacing:.06em;transition:color .3s;cursor:pointer}
.contact:hover{color:#888}
@media(max-width:600px){.contact{bottom:24px;right:24px;font-size:12px}}
</style>
</head>
<body>
<div class="wrap">
<h1>Collatio Labs</h1>
<p>Mathematical research laboratory</p>
</div>
<a href="mailto:contact@collatiolabs.com" class="contact">Contact</a>
</body>
</html>
